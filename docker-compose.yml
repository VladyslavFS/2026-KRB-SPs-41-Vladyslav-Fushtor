services:
  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Create bucket automatically
  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      minio:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-lake}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      until (mc alias set local http://minio:9000 $$AWS_ACCESS_KEY_ID $$AWS_SECRET_ACCESS_KEY); do sleep 1; done;
      mc mb -p local/$$S3_BUCKET || true;
      mc anonymous set download local/$$S3_BUCKET || true;
      echo 'MinIO bucket ready';
      "

  postgres_dwh:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DWH_DB:-earthquake}
      POSTGRES_USER: ${DWH_USER:-postgres}
      POSTGRES_PASSWORD: ${DWH_PASSWORD:-postgres}
    volumes:
      - postgres_dwh_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DWH_USER:-postgres} -d ${DWH_DB:-earthquake}"]
      interval: 10s
      timeout: 5s
      retries: 10

  streamlit:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./ui:/app/ui
    environment:
      DWH_HOST: ${DWH_HOST:-postgres_dwh}
      DWH_PORT: ${DWH_PORT:-5432}
      DWH_DB: ${DWH_DB:-earthquake}
      DWH_USER: ${DWH_USER:-postgres}
      DWH_PASSWORD: ${DWH_PASSWORD:-postgres}
    command: >
      sh -c "
      pip install --no-cache-dir streamlit psycopg2-binary pandas;
      streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
      "
    ports:
      - "8501:8501"
    depends_on:
      postgres_dwh:
        condition: service_healthy

volumes:
  minio_data:
  postgres_dwh_data:
